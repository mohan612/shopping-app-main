apiVersion: v1
kind: Namespace
metadata:
  name: shoppie
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: shoppie-backend
  namespace: shoppie
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shoppie-backend
  template:
    metadata:
      labels:
        app: shoppie-backend
    spec:
      containers:
        - name: backend
          image: acdemoacr001.azurecr.io/shoppie-backend:latest
          ports:
            - containerPort: 5000
          env:
            - name: PORT
              value: "5000"
            - name: HOST
              value: "0.0.0.0"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 5000
            initialDelaySeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: shoppie-backend
  namespace: shoppie
spec:
  selector:
    app: shoppie-backend
  ports:
    - port: 5000
      targetPort: 5000
  type: ClusterIP