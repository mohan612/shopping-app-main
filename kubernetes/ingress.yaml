apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: shoppie-ingress
  namespace: shoppie
spec:
  ingressClassName: nginx
  rules:
    - host: shoppie.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: shoppie-backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: shoppie-frontend
                port:
                  number: 8080